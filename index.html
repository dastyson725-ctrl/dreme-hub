<style>
  :root{
    --paper: #fbf3f3;
    --paper-dark: #f7e7e7;
    --ink: #3a1414;
    --ink-soft: #8a5a5a;
    --maroon: #c8202c;
    --maroon-deep: #9e1620;
    --mustard: #ffffff;
    --mustard-deep: #f3cdd0;
    --green-stamp: #c8202c;
    --line: #e9c9cb;
    --shadow: rgba(58,20,20,0.12);
    --font-display: 'Rajdhani', 'Arial Narrow', sans-serif;
    --font-body: 'Hind', 'Segoe UI', sans-serif;
    --font-mono: 'Space Mono', 'Courier New', monospace;
  }

  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

  #app-root{
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(58,20,20,0.04) 1px, transparent 0);
    background-size: 14px 14px;
    min-height: 100vh;
    width: 100%;
    box-sizing: border-box;
    padding: 0;
  }

  *{ box-sizing: border-box; }

  .topbar{
    background: var(--maroon);
    color: #ffffff;
    padding: 18px 20px 16px;
    position: relative;
    overflow: hidden;
    border-bottom: 4px solid #ffffff;
  }
  .topbar::before{
    content:"";
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 10px);
  }
  .topbar-inner{ position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:38px; height:38px; border-radius:50%;
    background: #ffffff; color: var(--maroon-deep);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight:700; font-size:18px;
    border: 2px solid var(--maroon-deep);
  }
  .brand-text h1{
    font-family: var(--font-display); font-weight:700; font-size:20px; margin:0; letter-spacing:0.3px;
    color: #ffffff;
  }
  .brand-text p{ margin:0; font-size:11px; opacity:0.9; font-family: var(--font-mono); letter-spacing:0.5px; color: #ffffff; }

  .tabs{ display:flex; gap:6px; }
  .tab-btn{
    font-family: var(--font-display); font-weight:700; font-size:13px;
    background: transparent; color: #ffffff;
    border: 2px solid rgba(255,255,255,0.55);
    border-radius: 999px; padding: 7px 16px; cursor:pointer;
    transition: all 0.15s ease; letter-spacing:0.3px;
  }
  .tab-btn.active{ background: #ffffff; color: var(--maroon-deep); border-color: #ffffff; }
  .tab-btn:hover:not(.active){ border-color: #ffffff; color: #ffffff; }

  .promo-banner{
    background: #ffffff;
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .promo-banner svg{ max-width: 280px; width: 100%; height: auto; }

  .container{ max-width: 560px; margin: 0 auto; padding: 22px 18px 60px; }

  .card{
    background: var(--paper-dark);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: 0 2px 0 var(--shadow);
    position: relative;
  }

  .eyebrow{
    font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
    color: var(--ink-soft); letter-spacing: 1.5px; margin: 0 0 6px;
  }
  h2.section-title{
    font-family: var(--font-display); font-size: 19px; font-weight:700; margin: 0 0 14px; color: var(--maroon-deep);
  }

  label.field-label{
    display:block; font-size: 13px; font-weight:600; color: var(--ink-soft); margin-bottom: 6px;
  }
  input.field-input{
    width:100%; padding: 11px 13px; border-radius: 9px;
    border: 1.5px solid var(--line); background: var(--paper);
    font-family: var(--font-body); font-size: 15px; color: var(--ink);
    margin-bottom: 12px; outline: none;
  }
  input.field-input:focus{ border-color: var(--maroon); }

  .btn{
    font-family: var(--font-display); font-weight:700; font-size: 14px;
    border:none; border-radius: 9px; padding: 11px 18px; cursor:pointer;
    letter-spacing: 0.3px; transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn:active{ transform: translateY(1px); }
  .btn-primary{ background: var(--maroon); color: var(--paper); width:100%; }
  .btn-primary:hover{ background: var(--maroon-deep); }
  .btn-secondary{ background: #ffffff; color: var(--maroon-deep); border: 1.5px solid var(--maroon); }
  .btn-outline{ background: transparent; color: var(--maroon); border: 1.5px solid var(--maroon); }
  .btn-block{ width:100%; }
  .btn-small{ font-size:12px; padding: 7px 12px; }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; }

  /* Punch card */
  .punchcard{
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 20px 18px;
    position: relative;
    background-image:
      linear-gradient(var(--paper) 0 0);
  }
  .punchcard::before, .punchcard::after{
    content:"";
    position:absolute; top:50%; width:22px; height:22px;
    background: var(--paper-dark); border: 2px solid var(--ink); border-radius:50%;
    transform: translateY(-50%);
  }
  .punchcard::before{ left:-13px; }
  .punchcard::after{ right:-13px; }

  .punchcard-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .punchcard-head h3{ font-family: var(--font-display); font-size:17px; margin:0; color: var(--maroon-deep); }
  .punchcard-head .phone-tag{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); }

  .stamp-grid{
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 14px 0 16px;
  }
  .stamp-slot{
    aspect-ratio: 1; border-radius: 50%; border: 2px dashed var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight:700; font-size: 13px; color: var(--line);
    background: var(--paper);
  }
  .stamp-slot.filled{
    border-style: solid; border-color: var(--green-stamp);
    background: rgba(79,111,79,0.08); color: var(--green-stamp);
    transform: rotate(-6deg);
    font-size: 20px;
  }
  .stamp-slot.next{ border-color: var(--mustard-deep); color: var(--mustard-deep); }

  .progress-line{ font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-soft); text-align:center; margin-bottom: 4px; }

  .reward-banner{
    margin-top: 14px; background: var(--maroon); color: #ffffff;
    border-radius: 10px; padding: 14px; text-align:center;
    border: 2px dashed var(--maroon-deep);
  }
  .reward-banner h4{ font-family: var(--font-display); font-size: 18px; margin: 0 0 4px; }
  .reward-banner p{ margin:0; font-size: 12.5px; }

  .qr-wrap{ display:flex; justify-content:center; margin: 14px 0 4px; }
  .qr-box{ background:#fff; padding: 10px; border-radius: 10px; border: 1px solid var(--line); }
  .qr-caption{ text-align:center; font-size: 12px; color: var(--ink-soft); margin-top: 6px; }

  .divider-stub{ text-align:center; font-family: var(--font-mono); font-size:11px; color: var(--ink-soft); margin: 4px 0 14px; letter-spacing: 1px; }

  /* Owner view */
  .scan-area{
    background: #14110f; border-radius: 12px; overflow:hidden; position:relative;
    aspect-ratio: 4/3; display:flex; align-items:center; justify-content:center; margin-bottom: 12px;
  }
  .scan-area video{ width:100%; height:100%; object-fit: cover; }
  .scan-overlay{
    position:absolute; inset: 18%; border: 2px solid var(--mustard); border-radius: 10px; pointer-events:none;
  }
  .scan-placeholder{ color: #8a8478; font-size:13px; text-align:center; padding: 20px; font-family: var(--font-mono); }
  .scan-status{ font-size: 12px; text-align:center; margin-top: -4px; margin-bottom:10px; color: var(--ink-soft); font-family: var(--font-mono); }

  .row-gap{ display:flex; gap:10px; }
  .row-gap > *{ flex:1; }

  table.customer-table{ width:100%; border-collapse: collapse; font-size: 13px; }
  table.customer-table th{
    text-align:left; font-family: var(--font-mono); font-size:11px; color: var(--ink-soft);
    border-bottom: 1.5px solid var(--ink); padding: 6px 4px; text-transform:uppercase;
  }
  table.customer-table td{ padding: 8px 4px; border-bottom: 1px dashed var(--line); }
  table.customer-table tr:last-child td{ border-bottom:none; }
  .pill{
    display:inline-block; font-family: var(--font-mono); font-size: 11px; padding: 2px 8px;
    border-radius: 999px; background: rgba(79,111,79,0.12); color: var(--green-stamp);
  }
  .pill.ready{ background: var(--maroon); color: #ffffff; }

  .empty-state{ text-align:center; padding: 30px 12px; color: var(--ink-soft); }
  .empty-state p{ font-size: 13px; margin: 4px 0 0; }

  .toast{
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 11px 20px; border-radius: 999px;
    font-size: 13px; font-family: var(--font-body); font-weight:600; z-index: 999;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25); white-space: nowrap;
    animation: toast-in 0.2s ease;
  }
  @keyframes toast-in{ from{ opacity:0; transform: translate(-50%, 8px); } to{ opacity:1; transform: translate(-50%,0); } }

  .pin-gate{ text-align:center; padding: 40px 12px; }
  .pin-dots{ display:flex; gap:10px; justify-content:center; margin: 18px 0; }
  .pin-dot{ width:14px; height:14px; border-radius:50%; border: 2px solid var(--maroon); }
  .pin-dot.filled{ background: var(--maroon); }
  .keypad{ display:grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 240px; margin: 0 auto; }
  .key-btn{
    font-family: var(--font-display); font-size: 18px; font-weight:700; padding: 14px 0;
    background: var(--paper); border: 1.5px solid var(--line); border-radius: 10px; cursor:pointer; color: var(--ink);
  }
  .key-btn:hover{ border-color: var(--maroon); }

  .muted-link{ background:none; border:none; color: var(--ink-soft); text-decoration: underline; font-size: 12px; cursor:pointer; font-family: var(--font-body); }

  .footnote{
    text-align:center; font-size:11px; color: var(--ink-soft); margin-top: 26px; font-family: var(--font-mono);
    padding: 14px 16px; border-radius: 14px;
    background:
      radial-gradient(circle at 15% 30%, rgba(200,32,44,0.10) 0%, transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(200,32,44,0.08) 0%, transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(200,32,44,0.07) 0%, transparent 50%),
      radial-gradient(circle at 30% 70%, rgba(243,205,208,0.5) 0%, transparent 55%),
      linear-gradient(135deg, #ffffff 0%, #fbf3f3 100%);
    border: 1px solid var(--line);
  }

  .product-strip{
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0;
  }
  .product-strip img{
    width: 100%; height: 150px; object-fit: cover; border-radius: 10px;
    border: 1px solid var(--line); background: #fff;
  }
  .product-strip-label{
    text-align:center; font-size: 11px; color: var(--ink-soft); font-family: var(--font-mono);
    letter-spacing: 0.5px; margin: 6px 0 16px; text-transform: uppercase;
  }

  @media (max-width: 380px){
    .brand-text p{ display:none; }
  }
</style>

  var PRODUCT_STRIP_HTML = '<div class="product-strip"><img src="' + PRODUCT_IMG_1 + '" alt="Store product" /><img src="' + PRODUCT_IMG_2 + '" alt="Store product" /></div><p class="product-strip-label">Available in store now</p>';

  var state = {
    tab: 'customer',          // 'customer' | 'owner'
    ownerUnlocked: false,
    pinChecking: false,
    pinInput: '',
    customerPhone: '',
    customerLoaded: null,     // record currently shown in customer view
    ownerSearchPhone: '',
    ownerActiveRecord: null,
    customersList: [],
    cameraOn: false,
    cameraStatus: '',
    toastMsg: '',
    toastTimer: null,
    loading: true,
  };

  var root = document.getElementById('app-root');
  var videoStream = null;
  var scanRAF = null;

  // ---------- storage (Firebase Realtime Database — syncs across all devices) ----------
  async function getCustomer(phone){
    try{
      var snap = await db.ref('customers/' + phone).get();
      return snap.exists() ? snap.val() : null;
    }catch(e){ return null; }
  }
  async function setCustomer(phone, record){
    try{
      await db.ref('customers/' + phone).set(record);
    }catch(e){ console.error('save failed', e); }
  }
  async function getAllCustomers(){
    try{
      var snap = await db.ref('customers').get();
      if(!snap.exists()) return [];
      var records = [];
      snap.forEach(function(child){ records.push(child.val()); });
      records.sort(function(a,b){ return (b.lastVisit||0) - (a.lastVisit||0); });
      return records;
    }catch(e){ return []; }
  }

  function newRecord(phone, name){
    return { phone: phone, name: name || '', stamps: 0, totalStamps: 0, rewardsRedeemed: 0, lastVisit: Date.now(), createdAt: Date.now() };
  }

  // ---------- toast ----------
  function showToast(msg){
    state.toastMsg = msg;
    render();
    if(state.toastTimer) clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(function(){ state.toastMsg=''; render(); }, 2200);
  }

  // ---------- QR ----------
  function renderQrInto(elId, text){
    setTimeout(function(){
      var el = document.getElementById(elId);
      if(!el || typeof QRCode === 'undefined') return;
      el.innerHTML = '';
      try{
        new QRCode(el, { text: text, width: 150, height: 150, colorDark: '#3a1414', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
      }catch(e){}
    }, 30);
  }

  // ---------- camera scanning ----------
  async function startCamera(){
    state.cameraStatus = 'Camera shuru ho raha hai...';
    render();
    try{
      videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      var video = document.getElementById('scan-video');
      if(!video) return;
      video.srcObject = videoStream;
      await video.play();
      state.cameraOn = true;
      state.cameraStatus = 'QR code ko frame ke andar laayein';
      render();
      scanLoop();
    }catch(e){
      state.cameraOn = false;
      state.cameraStatus = 'Camera available nahi hai — neeche manually phone number daalein';
      render();
    }
  }
  function stopCamera(){
    if(scanRAF) cancelAnimationFrame(scanRAF);
    if(videoStream){
      videoStream.getTracks().forEach(function(t){ t.stop(); });
      videoStream = null;
    }
    state.cameraOn = false;
    render();
  }
  function scanLoop(){
    var video = document.getElementById('scan-video');
    var canvas = document.getElementById('scan-canvas');
    if(!video || !canvas || typeof jsQR === 'undefined'){
      scanRAF = requestAnimationFrame(scanLoop);
      return;
    }
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var code = jsQR(imgData.data, imgData.width, imgData.height);
      if(code && code.data){
        var phone = digitsOnly(code.data);
        if(isValidPhone(phone)){
          stopCamera();
          state.ownerSearchPhone = phone;
          showToast('QR scan ho gaya: ' + phone);
          loadOwnerRecord(phone);
          return;
        }
      }
    }
    scanRAF = requestAnimationFrame(scanLoop);
  }

  // ---------- customer view actions ----------
  async function loadCustomerCard(){
    var phone = digitsOnly(state.customerPhone);
    if(!isValidPhone(phone)){ showToast('Sahi phone number daalein'); return; }
    var rec = await getCustomer(phone);
    if(!rec) rec = newRecord(phone);
    state.customerLoaded = rec;
    render();
    renderQrInto('customer-qr', phone);
  }

  // ---------- owner view actions ----------
  async function loadOwnerRecord(phoneRaw){
    var phone = digitsOnly(phoneRaw);
    if(!isValidPhone(phone)){ showToast('Sahi phone number daalein'); return; }
    var rec = await getCustomer(phone);
    if(!rec) rec = newRecord(phone);
    state.ownerActiveRecord = rec;
    render();
  }

  async function addStamp(){
    var rec = state.ownerActiveRecord;
    if(!rec) return;
    rec.stamps = Math.min(STAMP_GOAL, rec.stamps + 1);
    rec.totalStamps = (rec.totalStamps||0) + 1;
    rec.lastVisit = Date.now();
    await setCustomer(rec.phone, rec);
    showToast('✅ Stamp add ho gaya — ' + rec.stamps + '/' + STAMP_GOAL);
    state.ownerActiveRecord = rec;
    state.customersList = await getAllCustomers();
    render();
  }

  async function redeemReward(){
    var rec = state.ownerActiveRecord;
    if(!rec || rec.stamps < STAMP_GOAL) return;
    rec.stamps = 0;
    rec.rewardsRedeemed = (rec.rewardsRedeemed||0) + 1;
    rec.lastVisit = Date.now();
    await setCustomer(rec.phone, rec);
    showToast('🎉 50% OFF redeem ho gaya!');
    state.ownerActiveRecord = rec;
    state.customersList = await getAllCustomers();
    render();
  }

  async function refreshCustomerList(){
    state.customersList = await getAllCustomers();
    render();
  }

  // ---------- pin gate ----------
  var CACHED_PIN = null;

  async function getPin(){
    if(CACHED_PIN) return CACHED_PIN;
    try{
      var snap = await db.ref('settings/ownerPin').get();
      if(snap.exists() && snap.val()){
        CACHED_PIN = snap.val();
        return CACHED_PIN;
      }
    }catch(e){}
    // Firebase not reachable or PIN not set — use default
    return '1234';
  }
  async function setPin(pin){
    CACHED_PIN = pin;
    try{ await db.ref('settings/ownerPin').set(pin); }catch(e){}
  }

  async function checkPin(){
    state.pinChecking = true;
    render();
    var realPin = await getPin();
    state.pinChecking = false;
    if(state.pinInput === realPin){
      state.ownerUnlocked = true;
      state.pinInput = '';
      state.customersList = await getAllCustomers();
      render();
    }else{
      showToast('Wrong PIN — try 1234');
      state.pinInput = '';
      render();
    }
  }
  function pressKey(d){
    if(state.pinInput.length >= 4) return;
    state.pinInput += d;
    render();
    if(state.pinInput.length === 4){ setTimeout(checkPin, 150); }
  }

  // ---------- render ----------
  function stampGridHtml(rec){
    var html = '';
    for(var i=1;i<=STAMP_GOAL;i++){
      var filled = rec.stamps >= i;
      var isNext = !filled && rec.stamps === i-1;
      html += '<div class="stamp-slot ' + (filled?'filled':'') + ' ' + (isNext?'next':'') + '">' + (filled ? '★' : i) + '</div>';
    }
    return html;
  }

  function customerTabHtml(){
    var rec = state.customerLoaded;
    var html = '';
    html += '<div class="card">';
    html += '  <p class="eyebrow">View Your Card</p>';
    html += '  <h2 class="section-title">Enter Phone Number</h2>';
    html += '  <input class="field-input" id="cust-phone-input" type="tel" placeholder="Add your number" value="' + escapeHtml(state.customerPhone) + '" />';
    html += '  <button class="btn btn-primary" id="cust-load-btn">View My Card</button>';
    html += '</div>';
    html += PRODUCT_STRIP_HTML;

    if(rec){
      var pct = rec.stamps + '/' + STAMP_GOAL;
      html += '<div class="punchcard">';
      html += '  <div class="punchcard-head">';
      html += '    <div><h3>Loyalty Card</h3><span class="phone-tag">' + escapeHtml(rec.phone) + '</span></div>';
      html += '    <div class="phone-tag">' + pct + ' stamps</div>';
      html += '  </div>';
      html += '  <div class="stamp-grid">' + stampGridHtml(rec) + '</div>';
      if(rec.stamps >= STAMP_GOAL){
        html += '<div class="reward-banner"><h4>🎉 50% OFF Unlocked!</h4><p>Show this at the store to claim your reward.</p></div>';
      }else{
        html += '<p class="progress-line">' + (STAMP_GOAL - rec.stamps) + ' more purchase' + ((STAMP_GOAL - rec.stamps) === 1 ? '' : 's') + ' to unlock 50% OFF</p>';
      }
      html += '  <div class="divider-stub">✂ — — — — — — — — — — — — — — ✂</div>';
      html += '  <div class="qr-wrap"><div class="qr-box" id="customer-qr"></div></div>';
      html += '  <p class="qr-caption">Show this QR at checkout to get a stamp</p>';
      html += '</div>';
    }
    return html;
  }

  function ownerPinGateHtml(){
    var html = '<div class="card pin-gate">';
    html += '  <p class="eyebrow">Staff access only</p>';
    html += '  <h2 class="section-title">Enter PIN</h2>';
    html += '  <div class="pin-dots">';

      html += '<p style="text-align:center;font-size:13px;color:var(--ink-soft);margin:10px 0;">Checking...</p>';

      html += '  </div>';
    }
    html += '  <p class="footnote">Default PIN: 1234</p>';
    html += '</div>';
    return html;
  }

      html += '    <div class="scan-overlay"></div>';
    }else{
      html += '    <div class="scan-placeholder">📷<br/>Camera is off</div>';
    }
    html += '  </div>';
    html += '  <canvas id="scan-canvas" style="display:none;"></canvas>';
    if(state.cameraStatus){ html += '<p class="scan-status">' + escapeHtml(state.cameraStatus) + '</p>'; }
    html += '  <div class="row-gap">';
    if(!state.cameraOn){
      html += '    <button class="btn btn-secondary btn-block" id="start-cam-btn">📷 Start Camera</button>';
    }else{
      html += '    <button class="btn btn-outline btn-block" id="stop-cam-btn">Stop Camera</button>';
    }
    html += '  </div>';

    html += '  <div class="divider-stub">— or enter number manually —</div>';
    html += '  <input class="field-input" id="owner-phone-input" type="tel" placeholder="Customer\'s phone number" value="' + escapeHtml(state.ownerSearchPhone) + '" />';
    html += '  <button class="btn btn-primary" id="owner-load-btn">Find Customer</button>';
    html += '</div>';

    // active record
    if(state.ownerActiveRecord){
      var rec = state.ownerActiveRecord;
      html += '<div class="punchcard">';
      html += '  <div class="punchcard-head">';
      html += '    <div><h3>' + (rec.name ? escapeHtml(rec.name) : 'Customer') + '</h3><span class="phone-tag">' + escapeHtml(rec.phone) + '</span></div>';
      html += '    <div class="phone-tag">' + rec.stamps + '/' + STAMP_GOAL + '</div>';
      html += '  </div>';
      html += '  <div class="stamp-grid">' + stampGridHtml(rec) + '</div>';
      if(rec.stamps >= STAMP_GOAL){
        html += '<div class="reward-banner"><h4>🎉 50% OFF Ready</h4><p>Redeem the customer\'s reward</p></div>';
        html += '<button class="btn btn-secondary btn-block" style="margin-top:10px;" id="redeem-btn">Redeem Reward</button>';
      }else{
        html += '<button class="btn btn-primary btn-block" id="add-stamp-btn">+ 1 Add Stamp</button>';
      }
      html += '</div>';
    }

    // customer list
    html += '<div class="card">';
    html += '  <div style="display:flex; justify-content:space-between; align-items:center;">';
    html += '    <h2 class="section-title" style="margin-bottom:10px;">All Customers</h2>';
    html += '    <button class="muted-link" id="refresh-list-btn">refresh</button>';
    html += '  </div>';
    if(state.customersList.length === 0){
      html += '  <div class="empty-state">🧾<p>No customer records yet</p></div>';
    }else{
      html += '  <table class="customer-table"><thead><tr><th>Phone</th><th>Stamps</th><th>Rewards</th></tr></thead><tbody>';
      state.customersList.forEach(function(c){
        var ready = c.stamps >= STAMP_GOAL;
        html += '<tr>';
        html += '  <td>' + escapeHtml(c.phone) + (c.name ? ' <span style="color:var(--ink-soft);font-size:11px;">(' + escapeHtml(c.name) + ')</span>' : '') + '</td>';
        html += '  <td><span class="pill ' + (ready?'ready':'') + '">' + c.stamps + '/' + STAMP_GOAL + '</span></td>';
        html += '  <td>' + (c.rewardsRedeemed||0) + '×</td>';
        html += '</tr>';
      });
      html += '  </tbody></table>';
    }
    html += '</div>';

    html += '<button class="muted-link" id="lock-btn">🔒 Owner mode band karein</button>';

    return html;
  }

  function render(){
    var html = '';
    html += '<div class="topbar"><div class="topbar-inner">';
    html += '  <div class="brand"><div class="brand-mark">★</div><div class="brand-text"><h1>Dreme Hub</h1><p>10 PURCHASES = 50% OFF</p></div></div>';
    html += '  <div class="tabs">';
    html += '    <button class="tab-btn ' + (state.tab==='customer'?'active':'') + '" data-tab="customer">🙋 Customer</button>';
    html += '    <button class="tab-btn ' + (state.tab==='owner'?'active':'') + '" data-tab="owner">🧾 Store</button>';
    html += '  </div>';
    html += '</div></div>';

    html += '<div class="promo-banner">';
    html += '  <svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">';
    html += '    <text x="160" y="32" text-anchor="middle" font-family="Rajdhani, sans-serif" font-weight="700" font-size="26" fill="#c8202c" letter-spacing="1">DREME HUB</text>';
    html += '    <line x1="95" y1="44" x2="225" y2="44" stroke="#c8202c" stroke-width="1.5" stroke-dasharray="3,4" />';
    html += '    <g transform="translate(127,52)">';
    html += '      <path d="M21 2 C21 8 27 12 33 12 C39 12 45 8 45 2 L62 10 L57 28 L48 24 L48 70 L18 70 L18 24 L9 28 L4 10 Z" fill="#ffffff" stroke="#c8202c" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>';
    html += '      <text x="33" y="50" text-anchor="middle" font-family="Rajdhani, sans-serif" font-weight="700" font-size="14" fill="#c8202c">DH</text>';
    html += '    </g>';
    html += '  </svg>';
    html += '</div>';

    html += '<div class="container">';
    html += state.tab === 'customer' ? customerTabHtml() : ownerTabHtml();
    html += '<p class="footnote">Data is shared aur is artifact ko kholne wale sabhi ko dikh sakta hai · stamp goal: ' + STAMP_GOAL + '</p>';
    html += PRODUCT_STRIP_HTML;
    html += '</div>';

    if(state.toastMsg){ html += '<div class="toast">' + escapeHtml(state.toastMsg) + '</div>'; }

    root.innerHTML = html;
    attachHandlers();
  }

  function attachHandlers(){
    var tabBtns = root.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(b){
      b.onclick = function(){
        if(state.tab === 'owner' && state.cameraOn) stopCamera();
        state.tab = this.getAttribute('data-tab');
        render();
      };
    });

    var custInput = document.getElementById('cust-phone-input');
    if(custInput){
      custInput.oninput = function(){ state.customerPhone = this.value; };
      custInput.onkeydown = function(e){ if(e.key === 'Enter') loadCustomerCard(); };
    }
    var custLoadBtn = document.getElementById('cust-load-btn');
    if(custLoadBtn) custLoadBtn.onclick = loadCustomerCard;

    // pin keypad
    var keyBtns = root.querySelectorAll('.key-btn');
    keyBtns.forEach(function(b){
      b.onclick = function(){
        var k = this.getAttribute('data-key');
        if(k === 'back'){ state.pinInput = state.pinInput.slice(0,-1); render(); }
        else pressKey(k);
      };
    });

    var startCamBtn = document.getElementById('start-cam-btn');
    if(startCamBtn) startCamBtn.onclick = startCamera;
    var stopCamBtn = document.getElementById('stop-cam-btn');
    if(stopCamBtn) stopCamBtn.onclick = stopCamera;

    var ownerInput = document.getElementById('owner-phone-input');
    if(ownerInput){
      ownerInput.oninput = function(){ state.ownerSearchPhone = this.value; };
      ownerInput.onkeydown = function(e){ if(e.key === 'Enter') loadOwnerRecord(state.ownerSearchPhone); };
    }
    var ownerLoadBtn = document.getElementById('owner-load-btn');
    if(ownerLoadBtn) ownerLoadBtn.onclick = function(){ loadOwnerRecord(state.ownerSearchPhone); };

    var addStampBtn = document.getElementById('add-stamp-btn');
    if(addStampBtn) addStampBtn.onclick = addStamp;
    var redeemBtn = document.getElementById('redeem-btn');
    if(redeemBtn) redeemBtn.onclick = redeemReward;

    var refreshBtn = document.getElementById('refresh-list-btn');
    if(refreshBtn) refreshBtn.onclick = refreshCustomerList;

    var lockBtn = document.getElementById('lock-btn');
    if(lockBtn) lockBtn.onclick = function(){
      if(state.cameraOn) stopCamera();
      state.ownerUnlocked = false;
      state.ownerActiveRecord = null;
      render();
    };

    // re-render qr if customer card present (since innerHTML wipe clears the qrcode div)
    if(state.tab === 'customer' && state.customerLoaded){
      renderQrInto('customer-qr', state.customerLoaded.phone);
    }
  }

  render();
})();
</script>
